# DPI WorkOps — Deploy to Cloudflare Pages
# Governance: D:\ARH\AGENTS.md §9 CI Governance
# Rules: mise.toml for Node version, CLOUDFLARE_API_KEY + CLOUDFLARE_EMAIL (global key)

name: Deploy to Cloudflare Pages

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write

    steps:
      - uses: actions/checkout@v4

      - uses: jdx/mise-action@v2
        # Reads .mise.toml — node = "22"

      - run: npm ci

      - run: npm run build
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL }}

      - uses: cloudflare/wrangler-action@v3
        with:
          accountId: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy dist --project-name=dpi-workops --commit-dirty=true
          wranglerVersion: '4'
        env:
          CLOUDFLARE_API_KEY: ${{ secrets.CLOUDFLARE_API_KEY }}
          CLOUDFLARE_EMAIL: ${{ secrets.CLOUDFLARE_EMAIL }}
